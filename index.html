<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>FieldCalc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <button id="toggleSidebar" class="toggle-btn">
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </button>
            <h1>FieldCalc</h1>
            
            <div class="form-group site-name-group">
                <label>Назва ділянки:</label>
                <input type="text" id="siteName" placeholder="Введіть назву ділянки...">
            </div>

            <div class="form-group">
                <label>Система координат:</label>
                <select id="utmZone">
                    <option value="">Оберіть зону UTM</option>
                </select>
            </div>

            <div class="form-group">
                <label>Магнітне схилення:</label>
                <input type="number" id="magneticDeclination" value="7" min="-360" max="360">
            </div>

            <div class="form-group">
                <label>Кількість точок:</label>
                <input type="number" id="pointCount" value="3" min="3" max="20">
                <div class="center-btn">
                    <button id="generateTable">Змінити</button>
                </div>
            </div>

            <div id="pointsTable"></div>

            <div class="actions">
                <div class="action-row">
                    <button id="calculate">Розрахувати</button>
                    <button id="reset">Скинути</button>
                </div>
                <div class="action-row">
                    <button id="adjustClosure">Автокорекція</button>
                    <button onclick="document.getElementById('import').click()">Імпорт з KML</button>
                </div>
                <select id="exportFormat">
                    <option value="csv">CSV (таблиця)</option>
                    <option value="kml">KML (точки+полігон)</option>
                    <option value="kml-points">KML (тільки точки)</option>
                    <option value="kml-polygon">KML (тільки полігон)</option>
                    <option value="json">JSON (точки+полігон)</option>
                    <option value="arcgis">ArcGIS Shapefile</option>
                </select>
                <div class="action-row">
                    <button id="export">Експорт</button>
                    <button id="exportAll">Експорт всі</button>
                </div>
                <input type="file" id="import" accept=".json,.kml,.csv" style="display:none">
            </div>

            <div id="results">
                <div class="result-item">
                    <span>Площа (SP - TP*):</span>
                    <span id="area">-</span>
                </div>
                <div class="result-item">
                    <span>Периметр (SP - TP*):</span>
                    <span id="perimeter">-</span>
                </div>
                <div class="result-item">
                    <span>Похибка замикання:</span>
                    <span id="closureError">-</span>
                </div>
            </div>

            <div id="error"></div>
            
            <div class="author-section">
                <div class="author">Автор: Illia Usachov</div>
                <div class="idea">Ідея додатку: GIS The Halo Trust</div>
                <button id="licenseBtn" class="license-btn">Ліцензія</button>
            </div>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.min.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/shp-write@0.3.2/shp-write.js"></script>
    <script src="app.js"></script>
</body>
</html>
